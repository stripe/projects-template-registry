guided:
  category: one_time_payment
  framework: nextjs
template: stripe/nextjs-one-time-payment
variant: golden-path
default: true
variant_description: Vercel • Neon • Clerk
install_command: npm install
ref: 14feb287cb32695c92334d3fbe84c4fac1ee4b37
repo: https://github.com/stripe/stripe-build-templates/tree/main/nextjs_one_time_payment_golden-path
metadata:
  name: Next.js One-time Payment Starter
  description: One-time payment app with auth, database, and purchase unlocks
  owner: stripe
services:
