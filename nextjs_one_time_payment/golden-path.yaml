guided:
  category: one_time_payment
  framework: nextjs
template: stripe/nextjs-one-time-payment
variant: golden-path
default: true
variant_description: Vercel • Neon • Clerk • Twilio • Posthog
install_command: npm install && npm run setup:stripe
ref: 3fa897c849a4406569d9bf130b9f7785ac5d199a
repo: https://github.com/stripe/projects-templates/tree/main/nextjs_one_time_payment_golden-path
metadata:
  name: Next.js One-time Payment Starter
  description: One-time payment app with auth, database, and purchase unlocks
  owner: stripe
services:
  - vercel/project
  - clerk/auth
  - neon/postgres
  - posthog/analytics
  - twilio/email
next_steps:
  - label: Run locally
    command: npm run dev
  - label: Build product with Codex
    command: codex "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Build product with Claude
    command: claude "Help me turn this into a real product. Follow prompts/starter-to-product.md."
  - label: Deploy
    command: npm run deploy
tier_plans:
  vercel/project:
    free_lowest_cost: Vercel/hobby
    starter_paid: Vercel/pro
    higher_scale: Vercel/pro
  clerk/auth:
    free_lowest_cost: Clerk/hobby
    starter_paid: Clerk/pro
    higher_scale: Clerk/pro
  neon/postgres:
    free_lowest_cost: Neon/free
    starter_paid: Neon/launch
    higher_scale: Neon/launch
  posthog/analytics:
    free_lowest_cost:
      plan_service: PostHog/free
      provider_configuration:
        region: US
    starter_paid:
      plan_service: PostHog/pay_as_you_go
      provider_configuration:
        region: US
    higher_scale:
      plan_service: PostHog/pay_as_you_go
      provider_configuration:
        region: US
  twilio/email:
    free_lowest_cost: skip
    starter_paid: Twilio/hobbyist
    higher_scale: Twilio/business
