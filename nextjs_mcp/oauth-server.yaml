guided:
  # No first-class agent/MCP category exists in guided.yaml yet, so this surfaces
  # under "Something else". ai_agent matches the emerging registry convention
  # (e.g. daytona_coding_agent) for when Stripe promotes a category.
  category: ai_agent
  framework: nextjs
template: clerk/nextjs-mcp
variant: oauth-server
default: true
variant_description: Clerk OAuth • MCP server • agent tools
install_command: pnpm install
# Pinned to clerk/stripe-projects-templates@ce57c21 (main).
ref: ce57c21c40828630d21ef151b2fd5acc9c3c7f09
repo: https://github.com/clerk/stripe-projects-templates/tree/main/nextjs_mcp_oauth-server
metadata:
  name: Clerk MCP Server Starter
  description: OAuth-secured Model Context Protocol server — agents authenticate with Clerk and call your tools
  owner: clerk
  tags:
    - MCP
    - AI Agent
    - OAuth
    - Auth
    - Next.js
services:
  - clerk/auth
  - vercel/project
next_steps:
  - label: Run locally
    command: pnpm dev
  - label: Build product with Codex
    command: codex "Help me turn this into a real MCP server. Follow prompts/starter-to-product.md."
  - label: Build product with Claude
    command: claude "Help me turn this into a real MCP server. Follow prompts/starter-to-product.md."
  - label: Deploy
    command: pnpm run deploy
tier_plans:
  clerk/auth:
    free_lowest_cost: Clerk/hobby
    starter_paid: Clerk/pro
    higher_scale: Clerk/pro
  vercel/project:
    free_lowest_cost: Vercel/hobby
    starter_paid: Vercel/pro
    higher_scale: Vercel/pro
