guided:
  category: saas
  framework: nextjs
template: stripe/nextjs-saas
variant: amber-fox
default: true
variant_description: Vercel • Neon • Clerk
install_command: npm install && npm run setup:stripe
ref: a65bf3973f1ff2c7f2973bbee02e11e3d29779ad
repo: https://github.com/stripe/projects-templates/tree/main/nextjs_saas_amber-fox
metadata:
  name: Next.js SaaS Starter
  description: Subscription SaaS with auth, database, and billing
  owner: Stripe
services:
  - vercel/project
  - clerk/auth
  - neon/postgres
next_steps:
