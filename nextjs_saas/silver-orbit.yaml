guided:
  category: saas
  framework: nextjs
template: stripe/nextjs-saas
variant: silver-orbit
default: false
variant_description: Netlify • Neon • Clerk
install_command: npm install && npm run setup:stripe
ref: c36b16a9facfda92cd26c43222e5d65ca1768138
repo: https://github.com/stripe/projects-templates/tree/main/nextjs_saas_silver-orbit
